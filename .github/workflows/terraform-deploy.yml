name: Terraform Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.changed.outputs.envs }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect changed environments
        id: changed
        run: |
          # Get files changed in this push, keep only envs/ paths, strip filename to get the folder
          changed=$(git diff HEAD~1 HEAD --name-only \
            | grep '^envs/' \
            | grep -v '/common/' \
            | sed 's|/[^/]*$||' \
            | sort -u \
            | tr '\n' ' ' \
            | xargs)
          echo "Detected: $changed"
          echo "envs=$changed" >> $GITHUB_OUTPUT

      - name: Set up Terraform
        if: steps.changed.outputs.envs != ''
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.12.0

      - name: Configure AWS Credentials
        if: steps.changed.outputs.envs != ''
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-ci
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Plan
        if: steps.changed.outputs.envs != ''
        run: |
          for env in ${{ steps.changed.outputs.envs }}; do
            echo "=== Planning: $env ==="
            cd "$env"
            terraform init -input=false
            terraform validate
            terraform plan -input=false \
              -var-file="common.account.auto.tfvars" \
              -var-file="common.region.auto.tfvars"
            cd - > /dev/null
          done

  apply:
    name: Terraform Apply
    needs: plan
    if: needs.plan.outputs.envs != ''
    runs-on: ubuntu-latest
    environment: apply   # ← pauses here, waits for your manual approval

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.12.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-ci
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Apply
        run: |
          for env in ${{ needs.plan.outputs.envs }}; do
            echo "=== Applying: $env ==="
            cd "$env"
            terraform init -input=false
            terraform apply -auto-approve -input=false \
              -var-file="common.account.auto.tfvars" \
              -var-file="common.region.auto.tfvars"
            cd - > /dev/null
          done
