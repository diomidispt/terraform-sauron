name: Terraform Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.find-envs.outputs.envs }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.12.0

      - name: Find Changed Environments
        id: find-envs
        run: |
          if [[ $GITHUB_EVENT_NAME == "pull_request" ]]; then
            changed_files=$(git diff origin/main...HEAD --name-only)
          else
            changed_files=$(git diff HEAD~1 HEAD --name-only)
          fi

          envs_files=$(echo "$changed_files" | grep '^envs/' || true)

          if [[ -z "$envs_files" ]]; then
            echo "No changed environments found. Skipping."
            echo "envs=" >> $GITHUB_OUTPUT
            exit 0
          fi

          filtered=$(echo "$envs_files" \
            | sed 's|/[^/]*$|/|' \
            | sort | uniq \
            | grep -v '/common/' || true)

          envs_list=$(echo "$filtered" | tr '\n' ' ' | xargs)
          echo "Changed environments: $envs_list"
          echo "envs=$envs_list" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        if: steps.find-envs.outputs.envs != ''
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-ci
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Plan
        if: steps.find-envs.outputs.envs != ''
        run: |
          for env in ${{ steps.find-envs.outputs.envs }}; do
            if [ ! -d "$env" ]; then
              echo "Directory $env does not exist. Skipping."
              continue
            fi
            echo "Planning: $env"
            cd "$env"
            terraform init -input=false
            terraform validate
            terraform plan -input=false \
              -var-file="common.account.auto.tfvars" \
              -var-file="common.region.auto.tfvars"
            cd - > /dev/null
          done

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan.outputs.envs != ''
    runs-on: ubuntu-latest
    environment: apply

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.12.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-ci
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Apply
        run: |
          for env in ${{ needs.plan.outputs.envs }}; do
            if [ ! -d "$env" ]; then
              echo "Directory $env does not exist. Skipping."
              continue
            fi
            echo "Applying: $env"
            cd "$env"
            terraform init -input=false
            terraform apply -auto-approve -input=false \
              -var-file="common.account.auto.tfvars" \
              -var-file="common.region.auto.tfvars"
            cd - > /dev/null
          done
